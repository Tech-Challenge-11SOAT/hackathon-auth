spring:
  application:
    name: hackathon-auth
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/hackathondb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
  web:
    resources:
      add-mappings: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s
  # Flyway Configuration
  flyway:
    baseline-on-migrate: true
    validate-on-migrate: true
    validate-migration-naming: true
    out-of-order: false
    ignore-migration-patterns: "*:missing,*:future"
    locations: classpath:db/migration
    clean-disabled: true

jwt:
  secret: postechHackathon2026SecretKey12345
  refresh-token-expiration: 900000
  access-token-expiration: 604800000

cors:
  allowed-origins: http://localhost:3000,http://localhost:4200
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS,PATCH
  allowed-headers: "*"
  allow-credentials: true

rate-limit:
  enabled: ${RATE_LIMIT_ENABLED:true}
  max-requests: ${RATE_LIMIT_MAX_REQUESTS:100}
  window-seconds: ${RATE_LIMIT_WINDOW_SECONDS:60}
  key-prefix: ${RATE_LIMIT_KEY_PREFIX:rate_limit}
  ignored-paths:
    - /swagger-ui/**
    - /v3/api-docs/**
    - /actuator/**