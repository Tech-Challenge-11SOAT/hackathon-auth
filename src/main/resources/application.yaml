spring:
  application:
    name: hackathon-auth
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/hackathondb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
  web:
    resources:
      add-mappings: true
  # Flyway Configuration
  flyway:
    baseline-on-migrate: true
    validate-on-migrate: true
    validate-migration-naming: true
    out-of-order: false
    ignore-migration-patterns: "*:missing,*:future"
    locations: classpath:db/migration
    clean-disabled: true

jwt:
  secret: ${JWT_SECRET:postechHackathon2026SecretKey12345}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:900000}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:604800000}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200}
  allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS,PATCH}
  allowed-headers: ${CORS_ALLOWED_HEADERS:*}
  allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}


management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true